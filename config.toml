# The URL the site will be built for
base_url = "https://guillego.com"

title = "guillego"

default_language = "en"

# Build a search index for use by JS later
build_search_index = true

generate_feeds = true
feed_filenames = ["atom.xml"]

taxonomies = [{ name = "tags" }]

[markdown]
highlight_code = true
insert_anchor_links = "none"

[extra]
# ─── Site identity ────────────────────────────────────────────────
# Used as the suffix of <title>, e.g. "guillego — Field notebook"
tagline = ""

# Author shown in atom feeds
author = "guillego"

# Favicon path inside static/
favicon = "/img/favicon.ico"

# GoatCounter site key (set to empty string to disable analytics)
goatcounter = "guillegos-sites"

# ─── Intro copy ───────────────────────────────────────────────────
# Markdown allowed. The first paragraph is also reused (links stripped)
# in the footer tagline.
intro = "I'm Guillermo, known as guillego in some places around the internet. This is my personal website where I share my [thoughts](/thoughts), [projects](/projects), [photography](/photography), and more."
intro_more = "You can also learn more [about me](/about), see [what I'm up to now](/now) or explore by [tags](/tags)."

# ─── Footer ───────────────────────────────────────────────────────
email_obfuscated = "mail [lands-at] guillego.com"
footer_credit = "made with ♡ by guillego"

# ─── Top nav ──────────────────────────────────────────────────────
# "Index" (the home link) is rendered first automatically.
nav = [
  { url = "/thoughts", label = "Thoughts" },
  { url = "/posts", label = "Blog" },
  { url = "/photography", label = "Photography" },
  { url = "/projects", label = "Projects" },
  { url = "/about", label = "About" },
  { url = "/now", label = "Now" },
]

# ─── Social links (footer "elsewhere" column) ─────────────────────
[[extra.social]]
name = "github"
url = "https://github.com/guillego"

[[extra.social]]
name = "bluesky"
url = "https://bsky.app/profile/guillego.com"
