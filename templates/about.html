{% extends "notebook-base.html" %}

{% block title %}About — {{ config.title }}{% endblock %}

{% block body %}
<main class="page narrow">
  <header class="page-hero ink-in">
    <h1 class="page-title ink-in d1"><em>Hi!</em></h1>
  </header>

  <hr class="rule" style="margin-top:36px; margin-bottom:32px">

  </article>
</main>
{% endblock %}
